include:
  - ./docker-compose-base.yml

services:
  ragflow:
    depends_on:
      mysql:
        condition: service_healthy
    image: ${RAGFLOW_IMAGE}
    container_name: ragflow-server
    ports:
      - ${SVR_HTTP_PORT}:9380
      - 9381:80
    volumes:
      - ./ragflow-logs:/ragflow/logs
      - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./entrypoint.sh:/ragflow/entrypoint.sh
      - ../web:/ragflow/web
      - ../api:/ragflow/api
      - ../agent:/ragflow/agent
      - ../deepdoc:/ragflow/deepdoc
      - ../rag:/ragflow/rag
      - ../sdk:/ragflow/sdk
      - ../graphrag:/ragflow/graphrag
      - ../flask_session:/ragflow/flask_session
      - ../agentic_reasoning:/ragflow/agentic_reasoning
      - ../pyproject.toml:/ragflow/pyproject.toml
      - ../conf/llm_factories.json:/ragflow/conf/llm_factories.json
 
    env_file: .env
    environment:
      - TZ=${TIMEZONE}
      - HF_ENDPOINT=${HF_ENDPOINT}
      - MACOS=${MACOS}
    mem_limit: 6073741824
    ulimits:
      nofile:
        soft: 500000
        hard: 500000
    networks:
      - ragflow
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gemini-mattermost:
    image: gemini-proxy
    container_name: gemini-mattermost
    ports:
      - "8090:8080"
    environment:
      - TZ=${TIMEZONE}
    networks:
      - ragflow
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gemini-openai-compatibility-nodejs:
    image: gemini-openai-compatibility-nodejs
    ports:
      - "8080:8080"
    volumes:
      - ../../../gemini-proxy/gemini-OpenAI-compatibility-nodejs:/app  # Mount toàn bộ thư mục code vào container
    environment:
      - NODE_ENV=development
    command: yarn dev  # Chạy chế độ phát triển với auto-reload



  executor:
    depends_on:
      mysql:
        condition: service_healthy
    image: ${RAGFLOW_IMAGE}
    container_name: ragflow-executor
    volumes:
      - ./ragflow-logs:/ragflow/logs
      - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../web:/ragflow/web
      - ../api:/ragflow/api
      - ../agent:/ragflow/agent
      - ../deepdoc:/ragflow/deepdoc
      - ../rag:/ragflow/rag
      - ../sdk:/ragflow/sdk
      - ../graphrag:/ragflow/graphrag
      - ../flask_session:/ragflow/flask_session
      - ../agentic_reasoning:/ragflow/agentic_reasoning
      - ../pyproject.toml:/ragflow/pyproject.toml
      - ../conf/llm_factories.json:/ragflow/conf/llm_factories.json

    env_file: .env
    environment:
      - TZ=${TIMEZONE}
      - HF_ENDPOINT=${HF_ENDPOINT}
      - MACOS=${MACOS}
    mem_limit: 6073741824
    ulimits:
      nofile:
        soft: 500000
        hard: 500000
    entrypoint: "/ragflow/entrypoint-parser.sh 1 3"
    networks:
      - ragflow
    restart: on-failure
    # https://docs.docker.com/engine/daemon/prometheus/#create-a-prometheus-configuration
    # If you're using Docker Desktop, the --add-host flag is optional. This flag makes sure that the host's internal IP gets exposed to the Prometheus container.
    extra_hosts:
      - "host.docker.internal:host-gateway"
 
