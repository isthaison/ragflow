include:
  - ./docker-compose-base.yml

services:
  ragflow:
    depends_on:
      mysql:
        condition: service_healthy
    image: ${RAGFLOW_IMAGE}
    # command:
    #   - --enable-mcpserver
    #   - --mcp-host=0.0.0.0
    #   - --mcp-port=9382
    #   - --mcp-base-url=http://127.0.0.1:9380
    #   - --mcp-script-path=/ragflow/mcp/server/server.py
    #   - --mcp-mode=self-host
    #   - --mcp-host-api-key="ragflow-VhMTI2YTU0YzhmNzExZWY5NjBiMDI0Mm"
    container_name: ragflow-server
    ports:
      - ${SVR_HTTP_PORT}:9380
      - 9381:80
      - 9382:9382 # entry for MCP

    volumes:
      - ./ragflow-logs:/ragflow/logs
      - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./entrypoint.sh:/ragflow/entrypoint.sh
      - ../web:/ragflow/web
      - ../api:/ragflow/api
      - ../agent:/ragflow/agent
      - ../deepdoc:/ragflow/deepdoc
      - ../rag:/ragflow/rag
      - ../sdk:/ragflow/sdk
      - ../graphrag:/ragflow/graphrag
      - ../flask_session:/ragflow/flask_session
      - ../agentic_reasoning:/ragflow/agentic_reasoning
      - ../../../f-vision/agent:/ragflow/history_data_agent
      - ../pyproject.toml:/ragflow/pyproject.toml
      - ../conf/llm_factories.json:/ragflow/conf/llm_factories.json
 
    env_file: .env
    environment:
      - TZ=${TIMEZONE}
      - HF_ENDPOINT=${HF_ENDPOINT}
      - MACOS=${MACOS}
    mem_limit: 6073741824
    ulimits:
      nofile:
        soft: 500000
        hard: 500000
    networks:
      - ragflow
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"


  # gemini-openai-compatibility-nodejs:
  #   image: gemini-openai-compatibility-nodejs
  #   ports:
  #     - "8080:8080"
  #     # - "8090:8080"
  #   volumes:
  #     - ../../../gemini-proxy:/app  # Mount toàn bộ thư mục code vào container
  #   environment:
  #     - NODE_ENV=development
  #   command: yarn dev  # Chạy chế độ phát triển với auto-reload
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl http://localhost:8080/health"]
  #     interval: 1m30s
  #     timeout: 30s
  #     retries: 5
  #     start_period: 30s

  huggingface:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    ports:
      - "3124:3124"
    volumes:
      - ../huggingface:/data
    env_file: .env
    environment:
      - MODEL_ID=sentence-transformers/all-MiniLM-L6-v2
      - HF_TOKEN=${HF_TOKEN}  
      - PORT=3124
      - TZ=${TIMEZONE}
    networks:
      - ragflow
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
  classifier-api:
    image: classifier-api
    container_name: classifier-api
    ports:
      - "3910:3000"  # Web port
    volumes:
      # Mount code directories to avoid copying during build
      - ../f-vision/classifier/main.py:/app/main.py
      - ../f-vision/classifier/api:/app/api
      - ../f-vision/classifier/data:/app/data
      - ../f-vision/classifier/web/.next/standalone:/app/web
      - ../f-vision/classifier/requirements-cpu.txt:/app/requirements.txt
      - ../f-vision/classifier/startup.sh:/app/startup.sh
   
    restart: unless-stopped
    # Add healthcheck configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/", "||", "exit", "1"]
      interval: 60s
      timeout: 3s
      retries: 3
    # Override the default command to use our mounted script
    command: ["/bin/sh", "/app/startup.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"